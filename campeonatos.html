<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bufarra</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        
        .page-title {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .trophy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            padding-top: 2rem;
        }

        .trophy-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
            padding: 3.5rem 2rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .trophy-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 25px rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.05);
        }

        .trophy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            border-radius: 0 0 10px 10px;
        }

        .trophy-icon {
            font-size: 5rem;
            color: #ffd700;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .trophy-year {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .trophy-name {
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .trophy-desc {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.6);
            margin-top: 1rem;
        }

        .champion-card {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #008744 100%) !important;
            border-color: rgba(255,255,255,0.3) !important;
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.3) !important;
        }

        .champion-card:hover {
            box-shadow: 0 25px 50px rgba(0, 255, 136, 0.5) !important;
        }

        .champion-card .trophy-year,
        .champion-card .trophy-name,
        .champion-card .trophy-desc,
        .champion-card .trophy-icon,
        .champion-card div {
            color: white !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
    <link rel="icon" type="image/png" href="img/logo/ESCUDO_BUFARRA.png">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="img/logo/ESCUDO_BUFARRA.png" alt="Escudo La Bufarra" style="height: 35px; width: auto; margin-right: 10px;" onerror="this.style.display='none';">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="jugadores.html">Jugadores</a></li>
                <li><a href="partidos.html">Partidos</a></li>
                <li><a href="entrenadores.html">Entrenadores</a></li>
                <li><a href="campeonatos.html" class="active">Campeonatos</a></li>
                <li><a href="historia.html">Historia</a></li>
                
                <li style="display:flex; align-items:center;"><a href="https://instagram.com/labufarra" target="_blank" style="display: flex; align-items: center; color: var(--accent-primary); line-height: 1;"><i class="ph-bold ph-instagram-logo" style="font-size: 1.2rem;"></i></a></li>
                <li style="display:flex; gap:0.5rem; align-items:center; font-family: var(--font-display);">
                    <a href="#" style="font-size:1rem; font-weight:800; color:var(--text-main);">ES</a>
                    <span style="color:var(--text-muted); font-size:1rem;">/</span>
                    <a href="#" style="font-size:1rem; font-weight:800; color:var(--text-muted); cursor:not-allowed;" title="Soon...">EN</a>
                </li>
            </ul>
        </div>
    </header>

    <!-- Nuevo Hero Cinematográfico -->
    <section class="page-hero">
        <h1>Historial de Campeonatos</h1>
        <p>Registro de todas nuestras participaciones y consagraciones oficiales a lo largo de los años.</p>
    </section>

    <main class="container mb-5" style="margin-bottom: 5rem;">
        <div class="trophy-grid">
            <!-- Filled dynamically by js/campeonatos.js -->
        </div>
    </main>

    <footer>
        <div class="footer-logo">LA BUFARRA</div>
        <p>© 2026 Estadísticas Oficiales. Archivo histórico desde 2021.</p>
    </footer>

    <script src="js/db.js?v=5.0"></script>
    <script src="js/campeonatos.js?v=5.0"></script>

</body>
</html>
