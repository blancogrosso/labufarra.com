<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bufarra</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .page-header {
            padding: 8rem 5% 4rem;
            text-align: center;
        }
        
        .page-title {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .trophy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .trophy-card {
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.05) 0%, rgba(10,10,10,0.8) 100%);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .trophy-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .trophy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: #ffd700;
        }

        .trophy-icon {
            font-size: 5rem;
            color: #ffd700;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
        }

        .trophy-year {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .trophy-name {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .trophy-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #aaa;
        }

        .champion-card {
            background: var(--accent-primary) !important;
            border-color: var(--accent-primary) !important;
        }

        .champion-card .trophy-year,
        .champion-card .trophy-name,
        .champion-card .trophy-desc,
        .champion-card .trophy-icon,
        .champion-card div {
            color: white !important;
        }

        .champion-card .trophy-icon {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)) !important;
        }
    </style>
    <link rel="icon" type="image/png" href="img/logo/ESCUDO_BUFARRA.png">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="img/logo/ESCUDO_BUFARRA.png" alt="Escudo La Bufarra" style="height: 35px; width: auto; margin-right: 10px;" onerror="this.style.display='none';">
                LA BUFARRA
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="jugadores.html">Jugadores</a></li>
                <li><a href="partidos.html">Partidos</a></li>
                <li><a href="entrenadores.html">Entrenadores</a></li>
                <li><a href="campeonatos.html" class="active">Campeonatos</a></li>
                <li><a href="historia.html">Historia</a></li>
                
                <li><a href="https://instagram.com/labufarra" target="_blank" style="display: flex; align-items: center; color: var(--accent-primary);"><i class="ph-bold ph-instagram-logo" style="font-size: 1.2rem;"></i></a></li>
            </ul>
        </div>
    </header>

    <main class="container mb-5" style="margin-bottom: 5rem;">
        <div class="page-header">
            <h1 class="page-title">Historial de Campeonatos</h1>
            <p style="color: var(--text-muted)">Registro de todas nuestras participaciones y consagraciones a lo largo de los años.</p>
        </div>

        <div class="trophy-grid">
            <!-- Filled dynamically by js/campeonatos.js -->
        </div>
    </main>

    <footer>
        <div class="footer-logo">LA BUFARRA</div>
        <p>© 2026 Estadísticas Oficiales. Archivo histórico desde 2021.</p>
    </footer>

    <script src="js/db.js?v=2.0"></script>
    <script src="js/campeonatos.js?v=2.0"></script>

</body>
</html>
