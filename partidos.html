<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bufarra</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async=""></script>
    
    <!-- Evitar caché en desarrollo/producción para datos dinámicos -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css?v=3.2">
    
    <style>
        .page-header {
            padding: 10rem 5% 4rem;
            text-align: center;
        }
        .page-title {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .matches-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .match-card-full {
            display: grid;
            grid-template-columns: 120px 1fr;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            margin-bottom: 0.5rem;
        }

        .match-card-full:hover {
            transform: translateX(10px) scale(1.02);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
            z-index: 10;
        }

        .match-date-badge {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        
        .match-card-full:hover .match-date-badge {
            background: rgba(255,107,129,0.05);
        }

        .match-date-badge .day {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
        }
        .match-date-badge .month {
            color: var(--accent-primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }

        .match-content {
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .match-tournament {
            font-size: 0.7rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            opacity: 0.8;
        }

        .match-teams {
            display: grid;
            grid-template-columns: 1fr 100px 1fr;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .team-home, .team-away {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 0.5px;
        }
        
        .team-home { text-align: right; }
        .team-away { text-align: left; }

        .match-score {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 900;
            text-align: center;
            padding: 0.4rem 0;
            border-radius: 10px;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            min-width: 90px;
        }

        .match-footer {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border-top: 1px solid var(--border-light);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .match-detail {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .match-detail i {
            color: var(--accent-primary);
            font-size: 1rem;
        }
        
        .goalscorers {
            width: 100%;
            margin-top: 0.5rem;
            color: #aaa;
            font-size: 0.8rem;
        }

        #totalMatchesCounter {
            font-family: var(--font-display);
        }

        /* Responsive Partidos */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2.2rem;
            }
            .match-card-full {
                flex-direction: column;
            }
            .match-date-badge {
                flex-direction: row;
                min-width: 100%;
                gap: 1rem;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
            }
            .match-date-badge .day {
                font-size: 1.5rem;
            }
            .match-teams {
                font-size: 1.2rem;
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
            .team-home, .team-away {
                text-align: center;
            }
            .match-score {
                order: -1;
                margin-bottom: 0.5rem;
            }
            .match-footer {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
            }
            .filters-container > div {
                flex-direction: column;
                align-items: center;
            }
            .result-circles {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="img/logo/ESCUDO_BUFARRA.png">
</head>
<body class="white-base">

    <header id="mainHeader">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <img src="img/logo/ESCUDO_BUFARRA.png" alt="Escudo" style="height: 40px; width: auto;" onerror="this.style.display='none';">
                </a>
            </div>
            <div class="nav-center">
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="jugadores.html">Jugadores</a></li>
                    <li><a href="partidos.html" class="active">Partidos</a></li>
                    <li><a href="entrenadores.html">Entrenadores</a></li>
                    <li><a href="campeonatos.html">Campeonatos</a></li>
                    <li><a href="historia.html">Historia</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <div class="nav-actions">
                    <a href="https://instagram.com/labufarra" target="_blank" style="color: var(--accent-primary); display:flex; align-items:center;">
                        <i class="ph-bold ph-instagram-logo" style="font-size: 1.4rem;"></i>
                    </a>
                    <div style="display:flex; gap:0.5rem; align-items:center; font-family: var(--font-display); font-size: 0.9rem;">
                        <span style="font-weight:800; color:var(--text-main);">ES</span>
                        <span style="color:var(--text-muted);">/</span>
                        <span style="font-weight:800; color:var(--text-muted); opacity:0.5;">EN</span>
                    </div>
                    <div class="nav-toggle">
                        <i class="ph-bold ph-list"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="container mb-5" style="margin-bottom: 5rem;">
        
        <div class="page-header">
            <div style="display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 2rem;">
                <div style="text-align: right;">
                    <span id="totalMatchesCounter" style="font-size: 4rem; font-weight: 800; color: var(--accent-primary); line-height: 1;">0</span>
                </div>
                <div style="text-align: left; border-left: 2px solid var(--border-light); padding-left: 1.5rem;">
                    <div style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Partidos<br>Jugados</div>
                </div>
            </div>
            <p style="color: var(--text-muted)">El registro oficial de todos nuestros encuentros desde la primera temporada.</p>
        </div>

        <div class="filters-container" style="display: flex; flex-direction: column; gap: 2rem; margin-bottom: 4rem;">
            <!-- Row 1: Search and Result Circles -->
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 1.5rem;">
                <div class="search-box search-container" style="position:relative; flex:1; max-width: 400px;">
                    <i class="ph-bold ph-magnifying-glass" style="color: var(--text-muted); position: absolute; left: 1rem;"></i>
                    <input type="text" id="rivalSearchInput" placeholder="Buscar por rival..." class="glass-panel" style="width: 100%; padding-left: 3rem;" oninput="handleSearchInput(this, 'clearBtnMatches')">
                    <button id="clearBtnMatches" class="clear-search-btn" onclick="clearSearch('rivalSearchInput', 'clearBtnMatches')">
                        <i class="ph-bold ph-x"></i>
                    </button>
                </div>
                
                <div class="result-circles" id="resultFilters" style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Resultado:</span>
                    <button class="res-circle-btn res-W" data-result="W" title="Ganados"></button>
                    <button class="res-circle-btn res-D" data-result="D" title="Empatados"></button>
                    <button class="res-circle-btn res-L" data-result="L" title="Perdidos"></button>
                    <button class="res-circle-btn active" data-result="ALL" style="background: var(--text-muted); border-color: var(--text-muted);" title="Todos"></button>
                </div>
            </div>

            <!-- Row 2: Year Filters -->
            <div class="filters-bar" id="yearFilters" style="margin-bottom: 0;">
                <button class="filter-btn active" data-year="2026">2026</button>
                <button class="filter-btn" data-year="2025">2025</button>
                <button class="filter-btn" data-year="2024">2024</button>
                <button class="filter-btn" data-year="2023">2023</button>
                <button class="filter-btn" data-year="2022">2022</button>
                <button class="filter-btn" data-year="2021">2021</button>
                <button class="filter-btn" data-year="AMISTOSOS">Amistosos</button>
                <button class="filter-btn" data-year="ALL">Todos</button>
            </div>
        </div>

        <div class="filters-bar" id="tournamentFilters" style="display: none; margin-bottom: 3rem; justify-content: center; flex-wrap: wrap; gap: 0.5rem;">
            <button class="filter-btn active" data-tournament="ALL">Todos (este año)</button>
            <button class="filter-btn" data-tournament="Apertura">Apertura</button>
            <button class="filter-btn" data-tournament="Intermedio">Intermedio</button>
            <button class="filter-btn" data-tournament="Clausura">Clausura</button>
            <button class="filter-btn" data-tournament="Verano">Verano</button>
            <button class="filter-btn" data-tournament="Campeones">C. Campeones</button>
            <button class="filter-btn" data-tournament="SuperCopa">SuperCopa</button>
            <button class="filter-btn" data-tournament="Rey">Copa del Rey</button>
            <button class="filter-btn" data-tournament="Amistoso">Amistoso</button>
        </div>

        <div class="matches-container" id="allMatchesContainer">
            <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                Cargando historial...
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-logo">LA BUFARRA</div>
        <p>© 2026 Estadísticas Oficiales. Archivo histórico desde 2021.</p>
    </footer>

    <script src="js/db.js?v=5.0"></script>
    <script src="js/partidos.js?v=5.0"></script>
    <script src="js/navigation.js"></script>
</body>
</html>
